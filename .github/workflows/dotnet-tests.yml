name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore HogRider.Backend.sln

      - name: Build
        run: dotnet build HogRider.Backend.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test HogRider.Backend.sln --configuration Release --verbosity normal